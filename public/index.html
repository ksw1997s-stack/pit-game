<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리 반 핏(Pit) 보드게임</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; padding: 10px; text-align: center; background-color: #f0f0f0; user-select: none; }
    #gameArea, #lobbyArea { display: none; }
    input { font-size: 18px; padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
    button { font-size: 18px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    .btn-blue { background-color: #2196F3; color: white; }
    .btn-green { background-color: #4CAF50; color: white; margin-top: 20px; width: 80%; }
    #myCardsContainer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 400px; margin: 20px auto; }
    .card { background-color: white; border: 2px solid #ccc; border-radius: 10px; font-size: 40px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .card.selected { border-color: #e91e63; background-color: #fce4ec; }
    .active-trade { margin: 10px auto; padding: 15px; background-color: #fff; border-radius: 10px; border: 3px solid #ff9800; max-width: 400px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loginArea">
    <h2>🤝 교실 무역 게임 (Pit)</h2>
    <input type="text" id="roomCode" placeholder="방 코드 (예: 1반)"><br>
    <input type="text" id="playerName" placeholder="내 이름 (세글자)"><br>
    <button onclick="joinRoom()" class="btn-blue">입장하기</button>
  </div>

  <div id="lobbyArea">
    <h3 id="lobbyTitle"></h3>
    <ul id="playerList" style="list-style:none; padding:0;"></ul>
    <button id="startBtn" onclick="startGame()" class="btn-green" style="display:none;">게임 시작 (2명 이상)</button>
  </div>

  <div id="gameArea">
    <h4 id="gameTitle"></h4>
    <button id="victoryBtn" onclick="declareVictory()" style="display:none; width: 100%; font-size: 24px; padding: 20px; background-color: #ff9800; color: white; border:none; border-radius:10px;">🔔 시장 독점!</button>
    <button id="restartBtn" onclick="restartGame()" class="btn-green" style="display:none;">다시 시작하기</button>
    <div id="myCardsContainer"></div>
    <span id="selectStatus">교환할 카드를 터치 (같은 종류만)</span>
    <button id="postTradeBtn" onclick="postTrade()" class="btn-blue" style="display:none;">장터에 올리기</button>
    <hr>
    <h4>장터</h4>
    <div id="tradesList"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myRoom = '', myCards = [], selectedIndices = [];

    function joinRoom() {
      const roomCode = document.getElementById('roomCode').value.trim();
      const playerName = document.getElementById('playerName').value.trim();
      if(roomCode && playerName) socket.emit('joinRoom', { roomCode, playerName });
    }

    socket.on('joinSuccess', ({ roomCode }) => {
      myRoom = roomCode;
      document.getElementById('loginArea').style.display = 'none';
      document.getElementById('lobbyArea').style.display = 'block';
    });

    socket.on('updatePlayers', (players) => {
      const list = document.getElementById('playerList');
      list.innerHTML = players.map(p => `<li>👤 ${p.name}</li>`).join('');
      if(players.length > 0 && players[0].id === socket.id) document.getElementById('startBtn').style.display = players.length >= 2 ? 'block' : 'none';
    });

    function startGame() { socket.emit('startGame', myRoom); }

    socket.on('gameStarted', (cards) => {
      myCards = cards;
      document.getElementById('lobbyArea').style.display = 'none';
      document.getElementById('gameArea').style.display = 'block';
      renderMyCards();
    });

    function renderMyCards() {
      const container = document.getElementById('myCardsContainer');
      container.innerHTML = ''; selectedIndices = [];
      myCards.forEach((card, index) => {
        const div = document.createElement('div');
        div.className = 'card'; div.innerText = card;
        div.onclick = () => toggleCard(index);
        container.appendChild(div);
      });
      checkVictory();
    }

    function toggleCard(index) {
      const pos = selectedIndices.indexOf(index);
      if(pos > -1) selectedIndices.splice(pos, 1);
      else {
        if(selectedIndices.length >= 4) return alert('최대 4장');
        if(selectedIndices.length > 0 && myCards[selectedIndices[0]] !== myCards[index]) return alert('같은 종류만 선택');
        selectedIndices.push(index);
      }
      document.querySelectorAll('.card').forEach((div, i) => div.classList.toggle('selected', selectedIndices.includes(i)));
      document.getElementById('postTradeBtn').style.display = selectedIndices.length > 0 ? 'inline-block' : 'none';
    }

    function postTrade() { socket.emit('postTrade', { roomCode: myRoom, cardIndexes: selectedIndices }); }

    socket.on('updateTrades', (trades) => {
      const list = document.getElementById('tradesList');
      list.innerHTML = '';
      trades.forEach(t => {
        if(t.playerId !== socket.id) {
          const div = document.createElement('div');
          div.className = 'active-trade';
          div.innerText = `${t.playerName}가 ${t.cardCount}장 원함!`;
          div.onclick = () => {
             if(selectedIndices.length === t.cardCount && confirm('교환할까요?')) socket.emit('acceptTrade', { roomCode: myRoom, tradeId: t.tradeId, myCardIndexes: selectedIndices });
          };
          list.appendChild(div);
        }
      });
    });

    socket.on('updateMyCards', (newCards) => { myCards = newCards; renderMyCards(); });

    function checkVictory() {
      if (myCards.length === 9 && myCards.every(c => c === myCards[0])) document.getElementById('victoryBtn').style.display = 'block';
    }

    function declareVictory() { socket.emit('declareVictory', myRoom); }

    function restartGame() { socket.emit('restartGame', myRoom); }

    socket.on('gameOver', (data) => {
      alert(`🎉 ${data.winnerName} 승리!`);
      document.getElementById('victoryBtn').style.display = 'none';
      document.getElementById('postTradeBtn').style.display = 'none';
      // 방장만 다시 시작 버튼 보이기
      document.getElementById('restartBtn').style.display = 'block';
    });

    socket.on('gameReset', () => {
      alert('새로운 게임 시작!');
      document.getElementById('gameArea').style.display = 'none';
      document.getElementById('lobbyArea').style.display = 'block';
      document.getElementById('restartBtn').style.display = 'none';
    });
    
    socket.on('errorMsg', (msg) => alert(msg));
  </script>
</body>
</html>
